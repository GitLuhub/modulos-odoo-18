name: CI - Tests and Linting

on:
  push:
    branches: [main, staging, 'feature/**']
  pull_request:
    branches: [main, staging]

jobs:
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install flake8 black isort

      - name: Run flake8
        run: |
          flake8 addons/ --max-line-length=120 --extend-ignore=E203,W503

      - name: Run black check
        run: |
          black --check addons/

      - name: Run isort check
        run: |
          isort --check-only addons/

  docker-build:
    name: Validate Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t odoo-dev:${{ github.sha }} .

      - name: Run hadolint
        run: |
          docker run --rm -v "$PWD:/data" hadolint/hadolint hadolint /data/Dockerfile

  tests:
    name: Run Odoo Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r config/requirements.txt

      - name: Run unit tests (simulated)
        run: |
          echo "Running module tests..."
          python -m pytest addons/custom_module/tests/ -v || true
