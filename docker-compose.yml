services:
  odoo:
    image: odoo:18.0
    container_name: odoo-dev
    restart: unless-stopped
    ports:
      - "8069:8069"
    volumes:
      - odoo-data:/var/lib/odoo
      - ./addons:/mnt/extra-addons
      - ./config/odoo.conf:/etc/odoo/odoo.conf
    depends_on:
      - postgres
    networks:
      - odoo-network

  postgres:
    image: postgres:15
    container_name: odoo-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=odoo
      - POSTGRES_USER=odoo
      - POSTGRES_PASSWORD=odoo
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data/pgdata
    networks:
      - odoo-network

  adminer:
    image: adminer
    container_name: odoo-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    networks:
      - odoo-network

volumes:
  odoo-data:
  postgres-data:

networks:
  odoo-network:
    driver: bridge
